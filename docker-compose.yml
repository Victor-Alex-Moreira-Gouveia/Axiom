services:
  postgresSQL:
    image: postgres:16-alpine
    container_name: DB_Server
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_DB: ${DB_DATABASE}
    ports:
      - "5432:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql:z        # <-- Adicionado :z aqui
      - ./databases/:/docker-entrypoint-initdb.d:ro,z

  nextcloud:
    image: nextcloud:stable
    container_name: nextcloud_app
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8080:80"
    depends_on:
      - postgresSQL
    environment:
      - POSTGRES_HOST=postgresSQL
      - POSTGRES_DB=${DB_DATABASE}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - NEXTCLOUD_ADMIN_USER=${NEXTCLOUD_ADMIN_USER}
      - NEXTCLOUD_ADMIN_PASSWORD=${NEXTCLOUD_ADMIN_PASSWORD}
      - NEXTCLOUD_TRUSTED_DOMAINS=${IP_GATEWAY} localhost 127.0.0.1
    volumes:
      - ./nextcloud_data:/var/www/html:z             # <-- Pasta local perfeita

# O bloco "volumes:" do final foi removido pois agora usamos apenas pastas locais (./)